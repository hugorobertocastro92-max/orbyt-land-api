services:
  - type: web
    name: orbyt-land-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ALLOWED_ORIGINS
        value: "https://orbyt-land-bcs.netlify.app,http://localhost:3000"
      - key: ANTHROPIC_API_KEY
        sync: false
