[build]
  functions = "netlify/functions"
  publish   = "public"

[build.environment]
  PYTHON_VERSION = "3.11"
  NETLIFY        = "true"

[functions]
  [functions.api]
    included_files = ["app/**", "app/**/**"]

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/health"
  to     = "/.netlify/functions/api/health"
  status = 200
